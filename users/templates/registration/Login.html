<!DOCTYPE html>
<html lang="en" ng-app="loginApp">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Astreon Study Buddy - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../../static/css/login.css">
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
  <script src="../../static/javascript/login.js"></script>
</head>
<body class="bg-white font-sans flex flex-col min-h-screen" ng-controller="LoginController">
  <!-- Header -->
  <header class="bg-white py-4 border-b border-[#E5E8EB]">
    <div class="max-w-7xl mx-auto px-4 flex items-center">
      <img src="../../static/imgs/Astreon.png" alt="Astreon Logo" class="h-25 w-25 mr-4">
      <h1 class="text-lg font-bold text-[#1C170D]">Astreon Study Buddy</h1>
    </div>
  </header>
  
  <!-- Main Content -->
  <main class="flex-grow flex justify-center items-center">
    <div class="w-full max-w-md bg-white rounded-lg p-6">
      <h2 class="text-center text-2xl font-bold text-[#1C170D] mb-4 tracking-wider">
        Welcome back to Astreon Study Buddy
      </h2>
      
      <!-- Login Form -->
      <form ng-submit="login()">
        <label class="block text-[#1C170D] font-semibold mb-1" for="username">Username</label>
        <input id="username" type="text" placeholder="Email or username"
               class="input-field" ng-model="user.username">
        
        <label class="block text-[#1C170D] font-semibold mb-1" for="password">Password</label>
        <input id="password" type="password" placeholder="Password"
               class="input-field" ng-model="user.password">
        
        <div class="flex items-center justify-between mb-4">
          <div class="flex items-center">
            <input id="remember" type="checkbox" class="text-[#009963] rounded focus:ring-[#009963]" ng-model="user.rememberMe">
            <label for="remember" class="ml-2 text-[#1C170D]">Remember me</label>
          </div>
          <a href="#" class="text-[#A1824A] hover:underline">Forgot password?</a>
        </div>
        
        <button type="submit" class="login-button">Log in</button>
        
        <div class="flex items-center mb-4">
          <span class="flex-grow border-t border-[#A1824A]"></span>
          <span class="mx-3 text-[#A1824A]">Or</span>
          <span class="flex-grow border-t border-[#A1824A]"></span>
        </div>
        
        <button type="button" class="google-button">
          <svg class="w-5 h-5 mr-2" fill="currentColor" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <path d="M21.6 12.2c0-.5 0-.9-.1-1.3H12v2.5h5.5c-.2 1.1-.8 2.1-1.7 2.8v2.3h2.7c1.6-1.5 2.6-3.7 2.6-6.3z"/>
            <path d="M12 22c2.4 0 4.4-.8 5.9-2.2l-2.7-2.3c-.8.5-1.8.7-2.9.7-2.2 0-4.1-1.5-4.7-3.5H5.7v2.3C7 19.7 9.3 22 12 22z"/>
            <path d="M7.3 14.7c-.2-.5-.3-1-.3-1.5s.1-1 .3-1.5V9.4H5.7C5.2 10.4 5 11.2 5 12c0 .8.2 1.6.7 2.6l1.6-1.9z"/>
            <path d="M12 5.5c1.3 0 2.5.4 3.5 1.2l2.5-2.5C16.4 2.8 14.4 2 12 2 9.3 2 7 4.3 5.7 7.3l2.6 2.1c.6-2 2.5-3.6 4.7-3.6z"/>
          </svg>
          Continue with Google
        </button>
      </form>
      
      <p class="text-center text-[#1C170D] mt-4">
        Don't have an account? <a href="#" class="text-[#A1824A] hover:underline">Sign up</a>
      </p>
    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-[#F5F0E5] text-[#A1824A] text-sm font-bold py-3">
    <div class="flex justify-center space-x-5 mb-2">
      <a href="#" class="hover:underline">About</a>
      <a href="#" class="hover:underline">Careers</a>
      <a href="#" class="hover:underline">Blog</a>
      <a href="#" class="hover:underline">Help Center</a>
    </div>
    <p class="text-center">&copy; 2024 Astreon Study Buddy</p>
  </footer>
</body>
</html>
